openapi: 3.0.0
info:
  title: Detektor Hoaks API (Capstone Project)
  description: Dokumentasi API Back-End untuk aplikasi Detektor Hoaks. API ini bertindak sebagai API Gateway yang mengintegrasikan aplikasi Front-End dengan Microservice AI (Python NLP).
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local Development Server
paths:
  /api/check:
    post:
      summary: Memeriksa indikasi hoaks pada judul berita
      description: Endpoint ini menerima headline berita, meneruskannya ke Microservice AI, dan mengembalikan hasil analisis probabilitas hoaks beserta artikel rujukan yang valid.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - headline
              properties:
                headline:
                  type: string
                  description: Judul berita yang ingin diperiksa indikasi hoaksnya.
                  example: "Ijazah Jokowi Palsu"
      responses:
        "200":
          description: Berhasil melakukan analisis komprehensif dan mengembalikan data dari model AI.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    type: object
                    properties:
                      skor_hoax:
                        type: integer
                        description: Persentase probabilitas hoaks global (0-100).
                        example: 53
                      verdict:
                        type: string
                        description: Keputusan akhir dari analisis model AI.
                        example: "TIDAK PASTI (PERLU VERIFIKASI)"
                      keyakinan:
                        type: string
                        description: Tingkat keyakinan model terhadap verdict.
                        example: "rendah"
                      komponen_analisis:
                        type: object
                        properties:
                          rasio_konfirmasi:
                            type: object
                            properties:
                              membantah:
                                type: integer
                                example: 4
                              mendukung:
                                type: integer
                                example: 0
                          cek_fakta_resmi:
                            type: string
                            example: "Tidak ada cek fakta resmi ditemukan"
                          analisis_semantik:
                            type: array
                            items:
                              type: string
                            example: ["Narasi Berulang", "Mayoritas Membantah"]
                          jangkauan_penelusuran:
                            type: integer
                            example: 5
                      berita_terkait:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 1
                            judul:
                              type: string
                              example: "Polisi Limpahkan Lagi Berkas Kasus Ijazah Jokowi ke Kejaksaan - detikNews"
                            sumber:
                              type: string
                              example: "detikNews"
                            url:
                              type: string
                              format: uri
                              example: "https://news.google.com/rss/articles/..."
                            similarity:
                              type: number
                              format: float
                              description: Tingkat kemiripan artikel rujukan dengan judul berita utama.
                              example: 23.77
                            status:
                              type: string
                              example: "Membantah"
                            clickbait:
                              type: string
                              example: "no"
                            skor_hoax_artikel:
                              type: number
                              format: float
                              example: 21.22
                            trusted_source:
                              type: boolean
                              example: false
        "400":
          description: Bad Request (Input tidak valid atau headline kosong)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "Headline tidak boleh kosong!"
        "500":
          description: Internal Server Error (Server AI mati atau jaringan terputus)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "error"
                  message:
                    type: string
                    example: "Server AI sedang tidak aktif, Ngrok mati, atau terputus."
